openapi: 3.0.0
info:
  title: API Proyecto Final
  version: 1.0.0
  description: Documentación de los endpoints del backend en Node.js

paths:
  /api/articles/user/me:
    get:
      summary: Obtiene todos los artículos del usuario logueado
      description: Devuelve el inventario completo (publicados, vendidos, borradores) del usuario autenticado.
      tags:
        - Artículos
      security:
        - bearerAuth: []
      responses:
        200:
          description: Listado de los artículos del usuario obtenido con éxito.
        403:
          description: Token no proporcionado o incorrecto.

  /api/articles:
    get:
      summary: Obtiene todos los artículos con paginación y filtros
      description: Retorna una lista paginada de artículos. Por defecto muestra los de estado 'Publicado', pero permite filtrar por categoría, precio, estado de conservación, texto y estado del ciclo de vida.
      tags:
        - Artículos
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 10 }
        - name: search
          in: query
          schema: { type: string }
        - name: filterStatus
          in: query
          schema: { type: string, enum: ['Borrador', 'Publicado', 'En revisión', 'Retirado', 'Vendido'] }
        - name: category_id
          in: query
          schema: { type: integer }
        - name: min_price
          in: query
          schema: { type: number, format: float }
        - name: max_price
          in: query
          schema: { type: number, format: float }
        - name: condition
          in: query
          schema: { type: string, enum: ['Nuevo', 'Como nuevo', 'Buen estado', 'Aceptable'] }
      responses:
        '200':
          description: Lista de artículos y metadatos de paginación devueltos con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: object
                    description: Metadatos de la paginación (útil para el Frontend).
                    properties:
                      page:
                        type: integer
                        example: 1
                      pageSize:
                        type: integer
                        example: 10
                      count:
                        type: integer
                        description: Cantidad de elementos devueltos en esta página.
                        example: 10
                  results:
                    type: array
                    description: Listado de artículos que coinciden con la búsqueda.
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        user_id:
                          type: integer
                          example: 3
                        title:
                          type: string
                          example: "Bicicleta de montaña"
                        description:
                          type: string
                          example: "Bicicleta de montaña poco usada"
                        location:
                          type: string
                          example: "Almería"
                        price:
                          type: number
                          format: float
                          example: 250.50
                        condition:
                          type: string
                          example: "Usado"
                        status:
                          type: string
                          example: "Publicado"
                        category_id:
                          type: integer
                          example: 3
                        main_photo:
                          type: string
                          nullable: true
                          example: "https://imagenes.com/foto1.jpg"
                        updated_at:
                          type: string
                          format: date-time
                          example: "2026-06-09T20:00:00Z"
                        created_at:
                          type: string
                          format: date-time
                          example: "2026-06-09T20:00:00Z"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/500InternalServerErrorResponse'

    post:
      summary: Crea un nuevo artículo con imágenes
      description: Requiere token de autenticación. El user_id se extrae automáticamente del token.
      tags:
        - Artículos
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, price, category_id, condition, location]
              properties:
                category_id: { type: integer, example: 1 }
                title: { type: string, example: "Teclado Gaming Razer" }
                description: { type: string, example: "Teclado mecanico RGB" }
                price: { type: number, format: float, example: 89.99 }
                condition: { type: string, enum: ['Nuevo', 'Como nuevo', 'Buen estado', 'Aceptable'], example: "Nuevo" }
                location: { type: string, example: "Alicante" }
                images:
                  type: array
                  items: { type: string, format: binary }
      responses:
        '201':
          description: Artículo creado.

  /api/articles/{id}:
    get:
      summary: Obtiene un artículo por su ID
      tags:
        - Artículos
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Artículo obtenido.

    put:
      summary: Edita un artículo completo
      description: Modifica los datos principales. Solo el propietario puede hacerlo.
      tags:
        - Artículos
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, price, condition, category_id, location]
              properties:
                title: { type: string, example: "Bicicleta mejorada" }
                description: { type: string, example: "Suspensión nueva." }
                price: { type: number, format: float, example: 220.00 }
                condition: { type: string, enum: ['Nuevo', 'Como nuevo', 'Buen estado', 'Aceptable'], example: "Buen estado" }
                category_id: { type: integer, example: 3 }
                location: { type: string, example: "Madrid" }
      responses:
        200:
          description: Artículo actualizado exitosamente.

    delete:
      summary: Elimina un artículo por su ID
      description: Solo el propietario del artículo puede eliminarlo.
      tags:
        - Artículos
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Artículo eliminado exitosamente.

  /api/articles/{id}/status:
    patch:
      summary: Cambia el estado de un artículo (Ej. Marcar como Vendido)
      description: Permite al propietario actualizar la fase del ciclo de vida del artículo.
      tags:
        - Artículos
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: ['Borrador', 'Publicado', 'En revisión', 'Retirado', 'Vendido']
                  example: "Vendido"
      responses:
        200:
          description: Estado actualizado con éxito.

  /api/categories/landing:
    get:
      summary: Obtiene todas las categorías para la página de inicio
      description: Devuelve todas las categorías disponibles para mostrarlas en la página de inicio.
      tags:
        - Categorías
      responses:
        '200':
          description: Lista de categorías obtenida con éxito.

  /api/categories:
    get:
      summary: Obtiene todas las categorías
      tags:
        - Categorías
      responses:
        '200':
          description: Lista de categorías obtenida con éxito.
    post:
      summary: Crea una nueva categoría
      security:
        - bearerAuth: []
      tags:
        - Categorías
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                  minLength: 1
                  example: "Nueva categoría"
                slug:
                  type: string
                  minLength: 1
                  example: "new-category"
      responses:
        '201':
          description: Categoría creada con éxito.

  /api/categories/{id}:
    get:
      summary: Obtiene una categoría por su ID
      tags:
        - Categorías
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Categoría encontrada.
    put:
      summary: Actualiza una categoría por su ID
      security:
        - bearerAuth: []
      tags:
        - Categorías
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                  minLength: 1
                  description: Nuevo nombre de la categoría
                  example: "Modificar Nueva categoría"
                slug:
                  type: string
                  minLength: 1
                  description: Nuevo slug de la categoría
                  example: "update-category"
      responses:
        '200':
          description: Actualizado.
    delete:
      summary: Elimina una categoría por su ID
      security:
        - bearerAuth: []
      tags:
        - Categorías
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Categoría eliminada exitosamente.

  /api/favorites/user:
    get:
      summary: Obtiene todos los favoritos de un usuario autenticado
      security:
        - bearerAuth: []
      tags:
        - Favoritos
      responses:
        '200':
          description: Lista de artículos favoritos con su categoria e imagenes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoritesArticleResponse'
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/500InternalServerErrorResponse'
                
  /api/favorites:
    post:
      summary: Añade un elemento a favoritos
      security:
        - bearerAuth: []
      tags:
        - Favoritos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - article_id
              properties:
                user_id:
                  type: integer
                  description: ID del usuario que añade el favorito
                  example: 1
                article_id:
                  type: integer
                  description: ID del artículo que se añade como favorito
                  example: 3
      responses:
        '201':
          description: Favorito Creado.

  /api/favorites/{id}:
    get:
      summary: Obtiene un favorito por su ID
      tags:
        - Favoritos
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Favorito obtenido.
    delete:
      summary: Elimina un favorito por su ID
      security:
        - bearerAuth: []
      tags:
        - Favoritos
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Eliminado.

  /api/users:
    get:
      summary: Obtiene todos los usuarios registrados
      tags:
        - Usuarios
      responses:
        '200':
          description: Listado obtenido.

  /api/users/register:
    post:
      summary: Registrar un nuevo usuario
      tags:
        - Usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Registrado.

  /api/users/login:
    post:
      summary: Iniciar sesión de usuario
      tags:
        - Usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Token generado.

  /api/users/profile:
    put:
      summary: Editar el perfil del usuario autenticado
      tags:
        - Usuarios
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                location:
                  type: string
                avatar_url:
                  type: string
      responses:
        '200':
          description: Actualizado.

# Componentes
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Introduce tu token JWT sin la palabra 'Bearer'. Solo el texto del token.

  ## Schemas de respuesta

  schemas:
    FavoritesArticleResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              favoriteId:
                type: integer
                example: 22
              favoriteUserId:
                type: integer
                example: 16
              favoriteArticleId:
                type: integer
                example: 1
              articleId:
                type: integer
                example: 1
              ownerArticleId:
                type: integer
                example: 1
              title:
                type: string
                example: iPhone 13 Pro
              price:
                type: string
                example: '650.00'
              condition:
                type: string
                example: Como nuevo
              status:
                type: string
                example: Publicado
              location:
                type: string
                example: Alicante
              category:
                $ref: '#/components/schemas/CategoryResponse'
              photos:
                type: array
                items:
                  $ref: '#/components/schemas/PhotosResponse'

    CategoryResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Electrónica
        slug:
          type: string
          example: electronica

    PhotosResponse:
      type: object
      properties:
        id:
          type: integer
          example: 18
        url:
          type: string
          format: uri
          example: https://res.cloudinary.com/demo/image/upload/iphone.jpg
        order:
          type: integer
          example: 0

    ## Respuestas de error

    500InternalServerErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Error de conexión con la base de datos"
