openapi: 3.0.0
info:
  title: API Proyecto Final
  version: 1.0.0
  description: Documentación de los endpoints del backend en Node.js

paths:

  /api/articles:
    get:
      summary: Obtiene todos los artículos con paginación y filtros
      description: Retorna una lista paginada de artículos que están en estado 'Publicado', permitiendo filtrar por categoría, rango de precios y estado/condición.
      tags:
        - Artículos
      parameters:
        # --- PARÁMETROS DE PAGINACIÓN ---
        - name: page
          in: query
          description: Número de la página que se quiere recuperar.
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          description: Cantidad de artículos por página.
          required: false
          schema:
            type: integer
            default: 10

        # --- PARÁMETROS DE FILTRADO ---
        - name: category_id
          in: query
          description: Filtrar por el ID de la categoría.
          required: false
          schema:
            type: integer
        - name: min_price
          in: query
          description: Precio mínimo del artículo.
          required: false
          schema:
            type: number
            format: float
        - name: max_price
          in: query
          description: Precio máximo del artículo.
          required: false
          schema:
            type: number
            format: float
        - name: condition
          in: query
          description: Estado físico del artículo (ej. 'Nuevo', 'Usado').
          required: false
          schema:
            type: string

      responses:
        '200':
          description: Lista de artículos y metadatos de paginación devueltos con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  info:
                    type: object
                    description: Metadatos de la paginación (útil para el Frontend).
                    properties:
                      page:
                        type: integer
                        example: 1
                      pageSize:
                        type: integer
                        example: 10
                      count:
                        type: integer
                        description: Cantidad de elementos devueltos en esta página.
                        example: 10
                  results:
                    type: array
                    description: Listado de artículos que coinciden con la búsqueda.
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        user_id:
                          type: integer
                          example: 3
                        title:
                          type: string
                          example: "Bicicleta de montaña"
                        description:
                          type: string
                          example: "Bicicleta de montaña poco usada"
                        location:
                          type: string
                          example: "Almería"
                        price:
                          type: number
                          format: float
                          example: 250.50
                        condition:
                          type: string
                          example: "Usado"
                        status:
                          type: string
                          example: "Publicado"
                        category_id:
                          type: integer
                          example: 3
                        main_photo:
                          type: string
                          nullable: true
                          example: "https://imagenes.com/foto1.jpg"
                        updated_at:
                          type: string
                          format: date-time
                          example: "2026-06-09T20:00:00Z"
                        created_at:
                          type: string
                          format: date-time
                          example: "2026-06-09T20:00:00Z"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Error de conexión con la base de datos"
    post:
      summary: Crea un nuevo artículo con imágenes
      tags:
        - Artículos
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - title
                - price
                - user_id
                - category_id
              properties:
                user_id:
                  type: integer
                  example: 1
                  description: ID del usuario que publica el artículo
                category_id:
                  type: integer
                  example: 1
                  description: ID de la categoría a la que pertenece
                title:
                  type: string
                  example: "Teclado Gaming Razer"
                description:
                  type: string
                  example: "Teclado mecanico RGB"
                price:
                  type: number
                  format: float
                  example: 89.99
                condition:
                  type: string
                  description: Condición del artículo que se va a publicar
                  enum:
                    - 'Nuevo'
                    - 'Como nuevo'
                    - 'Buen estado'
                    - 'Aceptable'
                  example: "Nuevo"
                location:
                  type: string
                  example: "Alicante"
                status:
                  type: string
                  description: Estado actual del artículo en la plataforma
                  enum:
                    - 'Borrador'
                    - 'Publicado'
                    - 'En revisión'
                    - 'Retirado'
                    - 'Vendido'
                    - 'Reservado'
                  example: "Publicado"
                  default: 'Publicado'
                images:
                  type: array
                  description: Selecciona hasta 5 archivos de imagen
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Artículo creado.

  /api/articles/{id}:
    get:
      summary: Obtiene un artículo por su ID
      tags:
        - Artículos
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Artículo obtenido.
    delete:
      summary: Elimina un artículo por su ID
      tags:
        - Artículos
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Eliminado.

  /api/categories:
    get:
      summary: Obtiene todas las categorías
      tags:
        - Categorías
      responses:
        '200':
          description: Lista de categorías obtenida con éxito.
    post:
      summary: Crea una nueva categoría
      tags:
        - Categorías
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                  minLength: 1
                  example: "Nueva categoría"
                slug:
                  type: string
                  minLength: 1
                  example: "new-category"
      responses:
        '201':
          description: Categoría creada con éxito.

  /api/categories/{id}:
    get:
      summary: Obtiene una categoría por su ID
      tags:
        - Categorías
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Categoría encontrada.
    put:
      summary: Actualiza una categoría por su ID
      tags:
        - Categorías
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                  minLength: 1
                  description: Nuevo nombre de la categoría
                  example: "Modificar Nueva categoría"
                slug:
                  type: string
                  minLength: 1
                  description: Nuevo slug de la categoría
                  example: "update-category"
      responses:
        '200':
          description: Actualizado.
    delete:
      summary: Elimina una categoría por su ID
      tags:
        - Categorías
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Eliminado.

  /api/favorites:
    get:
      summary: Obtiene todos los favoritos
      tags:
        - Favoritos
      responses:
        '200':
          description: Lista de favoritos.
    post:
      summary: Añade un elemento a favoritos
      tags:
        - Favoritos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - article_id
              properties:
                user_id:
                  type: integer
                  description: ID del usuario que añade el favorito
                  example: 1
                article_id:
                  type: integer
                  description: ID del artículo que se añade como favorito
                  example: 3
      responses:
        '201':
          description: Favorito Creado.

  /api/favorites/{id}:
    get:
      summary: Obtiene un favorito por su ID
      tags:
        - Favoritos
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Favorito obtenido.
    delete:
      summary: Elimina un favorito por su ID
      tags:
        - Favoritos
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Eliminado.

  /api/users:
    get:
      summary: Obtiene todos los usuarios registrados
      tags:
        - Usuarios
      responses:
        '200':
          description: Listado obtenido.

  /api/users/register:
    post:
      summary: Registrar un nuevo usuario
      tags:
        - Usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                  example: "carlos_vende"
                email:
                  type: string
                  example: "carlos@email.com"
                password:
                  type: string
                  example: "Test1234!"
      responses:
        '201':
          description: Usuario registrado correctamente.
        '409':
          description: El email o el nombre de usuario ya están en uso.

  /api/users/login:
    post:
      summary: Iniciar sesión de usuario
      tags:
        - Usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: "carlos@email.com"
                password:
                  type: string
                  example: "Test1234!"
      responses:
        '200':
          description: Login correcto, devuelve el token JWT.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Login correcto"
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '401':
          description: Email o contraseña incorrectos.
        '403':
          description: La cuenta del usuario está bloqueada.

  /api/users/profile:
    get:
      summary: Obtiene el perfil del usuario autenticado
      tags:
        - Usuarios
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Datos del usuario autenticado.
    put:
      summary: Editar el perfil del usuario autenticado
      tags:
        - Usuarios
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                location:
                  type: string
                avatar_url:
                  type: string
      responses:
        '200':
          description: Actualizado.

  /api/reports:
    get:
      summary: Obtiene todos los reportes
      description: Solo accesible para Moderador o Administrador.
      tags:
        - Reportes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Listado de reportes obtenido con éxito.
        '403':
          description: Acceso denegado, requiere rol Moderador o Administrador.
    post:
      summary: Crear un nuevo reporte (de artículo o de usuario)
      description: El reporter_id se obtiene automáticamente del token. Si el tipo es 'Articulo' se debe enviar article_id; si es 'Usuario' se debe enviar reported_user_id.
      tags:
        - Reportes
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - reason
              properties:
                type:
                  type: string
                  enum:
                    - Articulo
                    - Usuario
                  example: "Articulo"
                article_id:
                  type: integer
                  description: Obligatorio si type es 'Articulo'.
                  example: 11
                reported_user_id:
                  type: integer
                  description: Obligatorio si type es 'Usuario'.
                  example: 10
                reason:
                  type: string
                  example: "El precio parece muy bajo, podría ser fraudulento"
      responses:
        '201':
          description: Reporte creado con éxito.
        '400':
          description: Faltan campos obligatorios o se han enviado campos incompatibles con el tipo de reporte.

  /api/admin/stats:
    get:
      summary: Estadísticas globales de la plataforma
      description: Devuelve artículos publicados, usuarios activos, reportes gestionados y artículos vendidos. Solo accesible para Administrador.
      tags:
        - Administrador
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Estadísticas obtenidas con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  articulosPublicados:
                    type: integer
                    example: 10
                  usuariosActivos:
                    type: integer
                    example: 8
                  reportesGestionados:
                    type: integer
                    example: 2
                  articulosVendidos:
                    type: integer
                    example: 1
        '403':
          description: Acceso denegado, requiere rol Administrador.

  /api/admin/users:
    get:
      summary: Obtiene el listado completo de usuarios
      description: Solo accesible para Administrador.
      tags:
        - Administrador
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Listado de usuarios obtenido con éxito.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 7
                    username:
                      type: string
                      example: "laura_moda"
                    email:
                      type: string
                      example: "laura@email.com"
                    role:
                      type: string
                      enum:
                        - Usuario
                        - Moderador
                        - Administrador
                      example: "Usuario"
                    status:
                      type: string
                      enum:
                        - Activo
                        - Bloqueado
                      example: "Activo"
                    avg_rating:
                      type: number
                      format: float
                      example: 4.50
                    location:
                      type: string
                      example: "Barcelona"
                    created_at:
                      type: string
                      format: date-time
        '403':
          description: Acceso denegado, requiere rol Administrador.

  /api/admin/users/{userId}:
    get:
      summary: Obtiene un usuario por su ID
      description: Solo accesible para Administrador.
      tags:
        - Administrador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
          example: 7
      responses:
        '200':
          description: Usuario encontrado.
        '404':
          description: El usuario no existe con ese ID.
        '403':
          description: Acceso denegado, requiere rol Administrador.
    put:
      summary: Edita los datos de un usuario
      description: Permite modificar username, email y location de cualquier usuario. Solo accesible para Administrador.
      tags:
        - Administrador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
          example: 7
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: "pepematias"
                email:
                  type: string
                  example: "pepematias@email.com"
                location:
                  type: string
                  example: "Logroño"
      responses:
        '200':
          description: Usuario actualizado con éxito.
        '404':
          description: El usuario no existe con ese ID.
        '403':
          description: Acceso denegado, requiere rol Administrador.
    delete:
      summary: Elimina un usuario
      description: Solo accesible para Administrador.
      tags:
        - Administrador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
          example: 7
      responses:
        '200':
          description: Usuario eliminado correctamente.
        '404':
          description: El usuario no existe con ese ID.
        '403':
          description: Acceso denegado, requiere rol Administrador.

  /api/admin/users/{userId}/role:
    put:
      summary: Cambia el rol de un usuario
      description: Permite asignar el rol Usuario, Moderador o Administrador. Solo accesible para Administrador.
      tags:
        - Administrador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
          example: 7
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              properties:
                role:
                  type: string
                  enum:
                    - Usuario
                    - Moderador
                    - Administrador
                  example: "Moderador"
      responses:
        '200':
          description: Rol actualizado con éxito.
        '400':
          description: El rol enviado no es válido.
        '404':
          description: El usuario no existe con ese ID.
        '403':
          description: Acceso denegado, requiere rol Administrador.

  /api/admin/users/{userId}/block:
    put:
      summary: Bloquea la cuenta de un usuario
      description: Cambia el status del usuario a 'Bloqueado'. Solo accesible para Administrador.
      tags:
        - Administrador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
          example: 7
      responses:
        '200':
          description: Usuario bloqueado con éxito.
        '404':
          description: El usuario no existe con ese ID.
        '403':
          description: Acceso denegado, requiere rol Administrador.

  /api/admin/users/{userId}/unblock:
    put:
      summary: Desbloquea la cuenta de un usuario
      description: Cambia el status del usuario a 'Activo'. Solo accesible para Administrador.
      tags:
        - Administrador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
          example: 12
      responses:
        '200':
          description: Usuario desbloqueado con éxito.
        '404':
          description: El usuario no existe con ese ID.
        '403':
          description: Acceso denegado, requiere rol Administrador.

# Componente de seguridad
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Introduce tu token JWT sin la palabra 'Bearer'. Solo el texto del token.